<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Command Overlay - The Editorial Workspace</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#ffece6",
              "secondary-container": "#85f6e5",
              "on-secondary": "#ffffff",
              "surface": "#f8f9fa",
              "tertiary-container": "#c24100",
              "outline": "#747688",
              "background": "#f8f9fa",
              "on-surface": "#191c1d",
              "inverse-surface": "#2e3132",
              "on-primary": "#ffffff",
              "secondary-fixed-dim": "#67d9c9",
              "primary-fixed": "#e0e0ff",
              "on-error-container": "#93000a",
              "secondary": "#006a60",
              "on-secondary-container": "#007166",
              "on-tertiary-fixed-variant": "#812800",
              "on-background": "#191c1d",
              "on-primary-fixed-variant": "#343d96",
              "primary-container": "#5c65bf",
              "surface-container-low": "#f3f4f5",
              "surface-container-highest": "#e1e3e4",
              "surface-container-lowest": "#ffffff",
              "surface-dim": "#d9dadb",
              "on-surface-variant": "#434656",
              "on-secondary-fixed-variant": "#005048",
              "on-error": "#ffffff",
              "primary": "#434ca5",
              "inverse-on-surface": "#f0f1f2",
              "surface-tint": "#4c56af",
              "primary-fixed-dim": "#bdc2ff",
              "surface-bright": "#f8f9fa",
              "on-primary-container": "#f0eeff",
              "outline-variant": "#c4c5d9",
              "on-tertiary-fixed": "#380d00",
              "surface-variant": "#e1e3e4",
              "secondary-fixed": "#85f6e5",
              "inverse-primary": "#bdc2ff",
              "error-container": "#ffdad6",
              "on-primary-fixed": "#000767",
              "tertiary-fixed-dim": "#ffb59b",
              "surface-container-high": "#e7e8e9",
              "on-tertiary": "#ffffff",
              "tertiary-fixed": "#ffdbcf",
              "surface-container": "#edeeef",
              "tertiary": "#993100",
              "on-secondary-fixed": "#00201c",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Newsreader"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .creative-canvas {
        line-height: 1.7;
      }
      .ai-glow {
        box-shadow: 0 0 15px rgba(103, 217, 201, 0.2);
      }
      .glass-overlay {
        backdrop-filter: blur(12px);
        background-color: rgba(248, 249, 250, 0.8);
      }
      .floating-ai-shadow {
        box-shadow: 0 12px 40px rgba(25, 28, 29, 0.06);
      }
    </style>
</head>
<body class="bg-[#f5f6f8] font-body text-on-surface">
<!-- TopNavBar -->
<!-- SideNavBar -->
<!-- Main Content Canvas (Dimmed) -->
<main class="min-h-screen bg-[#f5f6f8] flex items-center justify-center p-6">
<!-- AI Command Overlay -->
<div class="w-full max-flex justify-center">
<div class="w-full max-w-xl bg-surface-container-lowest rounded-xl floating-ai-shadow ai-glow border border-secondary-fixed-dim/20 flex flex-col overflow-hidden">
<!-- Overlay Header -->
<div class="px-6 py-4 bg-surface-container-low flex items-center justify-between border-b border-outline-variant/10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary font-bold" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-label text-xs font-bold uppercase tracking-widest text-secondary">AI Assistant</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer text-sm">close</span>
</div>
<!-- Input Field -->
<div class="p-6 pb-2">
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 focus:ring-0 focus:border-primary text-lg font-headline italic placeholder:text-outline-variant transition-colors" placeholder="Rewrite this as a list..." type="text"/>
<div class="absolute right-0 bottom-3">
<span class="material-symbols-outlined text-primary cursor-pointer">send</span>
</div>
</div>
</div>
<!-- AI Quick Actions Bento Style -->
<div class="px-6 py-4 grid grid-cols-2 gap-3">
<button class="flex items-center gap-3 p-3 rounded-lg bg-surface-container-high hover:bg-secondary-container/20 text-on-surface transition-all group border border-transparent hover:border-secondary-fixed-dim/30 text-left">
<span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform">edit_note</span>
<div>
<div class="text-xs font-bold uppercase tracking-tight text-on-surface">Rewrite</div>
<div class="text-[10px] text-on-surface-variant">Enhance for clarity</div>
</div>
</button>
<button class="flex items-center gap-3 p-3 rounded-lg bg-surface-container-high hover:bg-secondary-container/20 text-on-surface transition-all group border border-transparent hover:border-secondary-fixed-dim/30 text-left">
<span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform">reorder</span>
<div>
<div class="text-xs font-bold uppercase tracking-tight text-on-surface">Summarize</div>
<div class="text-[10px] text-on-surface-variant">Condense main points</div>
</div>
</button>
<button class="flex items-center gap-3 p-3 rounded-lg bg-surface-container-high hover:bg-secondary-container/20 text-on-surface transition-all group border border-transparent hover:border-secondary-fixed-dim/30 text-left">
<span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform">library_books</span>
<div>
<div class="text-xs font-bold uppercase tracking-tight text-on-surface">Evidence</div>
<div class="text-[10px] text-on-surface-variant">Find supporting data</div>
</div>
</button>
<button class="flex items-center gap-3 p-3 rounded-lg bg-surface-container-high hover:bg-secondary-container/20 text-on-surface transition-all group border border-transparent hover:border-secondary-fixed-dim/30 text-left">
<span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform">psychology</span>
<div>
<div class="text-xs font-bold uppercase tracking-tight text-on-surface">Tone</div>
<div class="text-[10px] text-on-surface-variant">Change to professional</div>
</div>
</button>
</div>
<!-- Context Preview -->
<div class="mx-6 p-4 rounded-lg bg-tertiary-fixed/10 border border-tertiary-fixed-dim/20 mb-6">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-tertiary text-sm">history_edu</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-tertiary">Selected Text</span>
</div>
<p class="text-xs font-headline italic text-on-surface-variant leading-relaxed">
                        "True creativity requires a sanctuary, a digital atelier where the tools are as refined as the ideas they serve."
                    </p>
</div>
<!-- Footer Actions -->
<div class="px-6 py-4 bg-surface-container-low flex justify-end items-center gap-4">
<button class="px-5 py-2 rounded-lg font-label text-sm font-semibold text-on-surface-variant hover:text-on-surface transition-colors">
                        Cancel
                    </button>
<button class="px-6 py-2 rounded-lg bg-primary text-on-primary font-label text-sm font-semibold hover:opacity-90 transition-all shadow-sm active:scale-95">
                        Apply Change
                    </button>
</div>
</div>
</div>
</main>
<!-- FAB (Suppressed on Details/Transactional, but shown here as it is the primary focus of this specific view) -->
</body></html>
