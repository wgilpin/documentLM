{% extends "base.html" %}

{% block title %}{% if doc %}{{ doc.title }}{% else %}New Document{% endif %} — AI Document Workbench{% endblock %}

{% block content %}
<div class="editor-layout">
    <!-- Left: Editor pane -->
    <div class="editor-pane">
        {% if doc %}
        <input type="text" id="doc-title" value="{{ doc.title }}"
               hx-put="/api/documents/{{ doc.id }}"
               hx-ext="json-enc"
               hx-trigger="change"
               hx-vals='js:{"title": document.getElementById("doc-title").value, "content": document.getElementById("document-content").value}'
               hx-swap="none">
        <textarea id="document-content"
                  hx-put="/api/documents/{{ doc.id }}"
                  hx-ext="json-enc"
                  hx-trigger="tiptap-changed delay:1s"
                  hx-vals='js:{"content": document.getElementById("document-content").value, "title": document.getElementById("doc-title").value}'
                  hx-swap="none"
                  style="display:none">{{ doc.content | e }}</textarea>

        <div class="editor-toolbar">
            <button id="undo-btn" class="toolbar-btn" disabled title="Undo" aria-label="Undo">&#8630; Undo</button>
            <button id="redo-btn" class="toolbar-btn" disabled title="Redo" aria-label="Redo">Redo &#8631;</button>
        </div>

        <div id="tiptap-mount" class="tiptap-editor tiptap-editor--loading"></div>

        <div id="tiptap-bubble-menu" class="bubble-menu" style="display:none">
            <button type="button" id="bubble-comment-btn">Comment</button>
        </div>

        <!-- US3: Inline suggestions overlay -->
        <div id="inline-suggestions"
             hx-get="/api/documents/{{ doc.id }}/suggestions"
             hx-trigger="load"
             hx-swap="innerHTML">
        </div>

        {% else %}
        <form action="/api/documents/form" method="post">
            <div class="form-group">
                <label for="doc-title">Title</label>
                <input type="text" id="doc-title" name="title" placeholder="Document title" required>
            </div>
            <div class="form-group">
                <label for="doc-overview">Overview</label>
                <textarea id="doc-overview" name="overview" rows="4"
                          placeholder="Describe what this document is about — the AI will research and plan it for you…"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top:0.5rem">Create Document</button>
        </form>
        {% endif %}
    </div>

    <!-- Right: Sidebar -->
    {% if doc %}
    <div class="sidebar">
        <!-- Sources section -->
        <div class="sidebar-section">
            <details class="source-list-details">
                <summary class="source-list-summary">Sources</summary>
                <ul id="source-list"
                    hx-get="/api/documents/{{ doc.id }}/sources"
                    hx-trigger="load"
                    hx-swap="innerHTML">
                </ul>
            </details>

            <!-- US4: Collapsed source entry -->
            <details class="source-add-details">
                <summary class="source-add-summary">Add Source</summary>

                <div class="source-tabs">
                    <button class="tab-btn active" onclick="switchTab('note')">Note</button>
                    <button class="tab-btn" onclick="switchTab('url')">URL</button>
                    <button class="tab-btn" onclick="switchTab('pdf')">PDF</button>
                </div>

                <div id="tab-note" class="tab-panel active">
                    <div id="source-error-note" class="source-error-container"></div>
                    <form hx-post="/api/documents/{{ doc.id }}/sources"
                          hx-target="#source-list"
                          hx-swap="beforeend"
                          hx-on::after-request="this.reset()">
                        <input type="hidden" name="source_type" value="note">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" name="title" placeholder="Note title" required>
                        </div>
                        <div class="form-group">
                            <label>Content</label>
                            <textarea name="content" rows="3" placeholder="Type your note…"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">Add Note</button>
                    </form>
                </div>

                <div id="tab-url" class="tab-panel">
                    <div id="source-error-url" class="source-error-container"></div>
                    <form hx-post="/api/documents/{{ doc.id }}/sources"
                          hx-target="#source-list"
                          hx-swap="beforeend"
                          hx-on::after-request="this.reset()">
                        <input type="hidden" name="source_type" value="url">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" name="title" placeholder="Reference title" required>
                        </div>
                        <div class="form-group">
                            <label>URL</label>
                            <input type="url" name="url" placeholder="https://…" required>
                        </div>
                        <div class="form-group">
                            <label>Summary</label>
                            <textarea name="content" rows="2" placeholder="Optional summary…"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">Add URL</button>
                    </form>
                </div>

                <div id="tab-pdf" class="tab-panel">
                    <div id="source-error-pdf" class="source-error-container"></div>
                    <form hx-post="/api/documents/{{ doc.id }}/sources"
                          hx-target="#source-list"
                          hx-swap="beforeend"
                          hx-encoding="multipart/form-data"
                          hx-on::after-request="this.reset()">
                        <input type="hidden" name="source_type" value="pdf">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" name="title" placeholder="PDF title" required>
                        </div>
                        <div class="form-group">
                            <label>PDF file</label>
                            <input type="file" name="file" accept=".pdf" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">Upload PDF</button>
                    </form>
                </div>
            </details>
        </div>

        <!-- Meta-chat panel -->
        <div class="meta-chat-panel">
            <div class="meta-chat-header">Meta Chat</div>
            <div id="chat-history"
                 hx-get="/api/documents/{{ doc.id }}/chat"
                 hx-trigger="load"
                 hx-swap="innerHTML">
            </div>
            <form class="chat-input-form"
                  hx-post="/api/documents/{{ doc.id }}/chat"
                  hx-target="#chat-history"
                  hx-swap="beforeend"
                  hx-on::before-request="lockEditor(); document.getElementById('chat-send-btn').classList.add('btn--loading')"
                  hx-on::after-request="unlockEditor(); document.getElementById('chat-send-btn').classList.remove('btn--loading'); this.reset()">
                <textarea name="content" class="chat-input-textarea" rows="2" placeholder="Ask the AI anything about your document…" required></textarea>
                <button type="submit" id="chat-send-btn" class="btn btn-primary btn-sm">Send</button>
            </form>
        </div>
    </div>
    {% endif %}
</div>

<!-- AI Instruction modal -->
{% if doc %}
<dialog id="command-modal">
    <form id="modal-comment-form"
          hx-post="/api/documents/{{ doc.id }}/comments"
          hx-target="#inline-suggestions"
          hx-swap="beforeend"
          hx-on::before-request="lockEditor(); document.getElementById('modal-submit-btn').classList.add('modal-submit-btn--loading')"
          hx-on::after-request="unlockEditor(); document.getElementById('modal-submit-btn').classList.remove('modal-submit-btn--loading'); document.getElementById('command-modal').close(); this.reset()">
        <input type="hidden" name="selection_start" id="modal-sel-start" value="0">
        <input type="hidden" name="selection_end" id="modal-sel-end" value="0">
        <input type="hidden" name="selected_text" id="modal-sel-text" value="">
        <input type="hidden" name="selected_node_id" id="modal-sel-node-id" value="">
        <input type="hidden" name="to_node_id" id="modal-sel-to-node-id" value="">
        <div class="modal-input-wrap">
            <textarea name="body" class="modal-body-input" placeholder="Instruction to the AI…" required></textarea>
            <button type="submit" id="modal-submit-btn" class="modal-submit-btn" aria-label="Submit">&#9654;</button>
        </div>
    </form>
</dialog>

<script>
/* switchTab must be in non-module scope — called from onclick attributes */
function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
}

function lockEditor()   { window.tiptapEditor?.setEditable(false, false); }
function unlockEditor() { window.tiptapEditor?.setEditable(true, false); }
</script>

<script type="importmap">
{
  "imports": {
    "@tiptap/core": "https://esm.sh/@tiptap/core@2",
    "@tiptap/pm": "https://esm.sh/@tiptap/pm@2",
    "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@2",
    "tiptap-markdown": "https://esm.sh/tiptap-markdown",
    "@tiptap/extension-unique-id": "https://esm.sh/@tiptap/extension-unique-id@2"
  }
}
</script>

<script type="module">
import { Editor } from '@tiptap/core';
import StarterKit from '@tiptap/starter-kit';
import { Markdown } from 'tiptap-markdown';
import UniqueID from '@tiptap/extension-unique-id';

const UNDO_BUFFER_SIZE = {{ undo_buffer_size }};

const mountEl = document.getElementById('tiptap-mount');
const bubbleMenuEl = document.getElementById('tiptap-bubble-menu');

let pendingSelection = { start: 0, end: 0, text: '', nodeId: null };
let pendingClickPos = { x: 0, y: 0 };
let lastChangeType = null;

// Load from JSON if available (content column stores TipTap JSON), fall back to empty
const rawContent = document.getElementById('document-content').value;
let initialContent;
try {
    initialContent = rawContent ? JSON.parse(rawContent) : '';
} catch (_) {
    initialContent = rawContent || '';
}

const editor = new Editor({
    element: mountEl,
    extensions: [
        StarterKit.configure({
            history: { depth: UNDO_BUFFER_SIZE, newGroupDelay: 0 },
        }),
        Markdown,
        UniqueID.configure({
            types: ['heading', 'paragraph', 'bulletList', 'orderedList',
                    'listItem', 'blockquote', 'codeBlock'],
        }),
    ],
    content: initialContent,
    onCreate({ editor }) {
        mountEl.classList.remove('tiptap-editor--loading');
    },
    onUpdate({ editor }) {
        const ta = document.getElementById('document-content');
        if (ta) ta.value = JSON.stringify(editor.getJSON());
        if (ta) ta.dispatchEvent(new Event('tiptap-changed'));
    },
});

window.tiptapEditor = editor;

// Undo/redo toolbar
const undoBtn = document.getElementById('undo-btn');
const redoBtn = document.getElementById('redo-btn');

editor.on('transaction', ({ transaction }) => {
    if (transaction.docChanged) {
        lastChangeType = transaction.getMeta('ai-change') ? 'ai-change' : 'keystroke';
    }
    const canUndo = editor.can().undo();
    const canRedo = editor.can().redo();
    undoBtn.disabled = !canUndo;
    redoBtn.disabled = !canRedo;
    undoBtn.title = canUndo
        ? (lastChangeType === 'ai-change' ? 'Undo AI change' : 'Undo')
        : 'Nothing to undo';
    redoBtn.title = canRedo ? 'Redo' : 'Nothing to redo';
});

undoBtn.addEventListener('click', () => editor.chain().focus().undo().run());
redoBtn.addEventListener('click', () => editor.chain().focus().redo().run());

// Right-click on editor → show bubble menu at mouse position
mountEl.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const { from, to } = editor.state.selection;
    const selectedText = from !== to ? editor.state.doc.textBetween(from, to, '\n') : '';
    const raw = editor.storage.markdown.getMarkdown();
    let mdIdx = selectedText ? raw.indexOf(selectedText) : -1;
    let mdText = selectedText;
    if (mdIdx === -1 && selectedText) {
        const escaped = selectedText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const m = raw.match(new RegExp('(?:#{1,6} |\\*{1,2}|_{1,2}|~~|> )*' + escaped));
        if (m) { mdIdx = raw.indexOf(m[0]); mdText = m[0]; }
    }

    // Capture the top-level doc node IDs at each end of the selection.
    // $pos.node(1) is the direct child of the doc (depth 1) — always a valid
    // block-level replacement target regardless of how deeply nested the cursor is.
    let capturedFromNodeId = null;
    let capturedToNodeId = null;
    if (from !== to) {
        const $from = editor.state.doc.resolve(from);
        const $to   = editor.state.doc.resolve(to);
        capturedFromNodeId = $from.node(1)?.attrs?.id ?? null;
        capturedToNodeId   = $to.node(1)?.attrs?.id ?? null;
    }

    pendingSelection = {
        start:    mdIdx >= 0 ? mdIdx : 0,
        end:      mdIdx >= 0 ? mdIdx + mdText.length : 0,
        text:     mdText,
        nodeId:   capturedFromNodeId,
        toNodeId: capturedToNodeId,
    };
    pendingClickPos = { x: e.clientX, y: e.clientY };
    bubbleMenuEl.style.position = 'fixed';
    bubbleMenuEl.style.top = (e.clientY - 44) + 'px';
    bubbleMenuEl.style.left = e.clientX + 'px';
    bubbleMenuEl.style.transform = 'translateX(-50%)';
    bubbleMenuEl.style.zIndex = '200';
    bubbleMenuEl.style.display = 'flex';
});

// Hide bubble menu when clicking outside it
document.addEventListener('mousedown', (e) => {
    if (!bubbleMenuEl.contains(e.target)) bubbleMenuEl.style.display = 'none';
});

document.getElementById('bubble-comment-btn').addEventListener('click', () => {
    document.getElementById('modal-sel-start').value = pendingSelection.start;
    document.getElementById('modal-sel-end').value = pendingSelection.end;
    document.getElementById('modal-sel-text').value = pendingSelection.text;
    document.getElementById('modal-sel-node-id').value = pendingSelection.nodeId || '';
    document.getElementById('modal-sel-to-node-id').value = pendingSelection.toNodeId || '';
    const modal = document.getElementById('command-modal');
    modal.style.margin = '0';
    modal.style.position = 'fixed';
    modal.style.left = Math.min(pendingClickPos.x, window.innerWidth - 520) + 'px';
    modal.style.top = Math.min(pendingClickPos.y, window.innerHeight - 300) + 'px';
    modal.showModal();
});

// OOB swap: chat agent edits push a replacement textarea via HTMX outerHTML swap.
// The textarea value is TipTap JSON — parse it and load into the editor (no autosave needed).
const editorPane = mountEl.closest('.editor-pane');
new MutationObserver((mutations) => {
    for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
            if (node.id === 'document-content') {
                htmx.process(node);
                let content;
                try { content = JSON.parse(node.value); }
                catch (_) { content = node.value; }
                const aiDocJson = (typeof content === 'object' && content?.type === 'doc')
                    ? content
                    : { type: 'doc', content: [{ type: 'paragraph', content: content ? [{ type: 'text', text: String(content) }] : [] }] };
                const aiDoc = editor.schema.nodeFromJSON(aiDocJson);
                const tr = editor.state.tr;
                tr.replaceWith(0, editor.state.doc.content.size, aiDoc.content);
                tr.setMeta('ai-change', true);
                editor.view.dispatch(tr);
            }
        }
    }
}).observe(editorPane, { childList: true, subtree: true });
</script>
{% endif %}
{% endblock %}
