{% extends "base.html" %}

{% block title %}{% if doc %}{{ doc.title }}{% else %}New Document{% endif %} — AI Document Workbench{% endblock %}

{% block content %}
<div class="editor-layout">
    <!-- Left: Editor pane -->
    <div class="editor-pane">
        {% if doc %}
        <input type="text" id="doc-title" value="{{ doc.title }}"
               hx-put="/api/documents/{{ doc.id }}"
               hx-ext="json-enc"
               hx-trigger="change"
               hx-vals='js:{"title": document.getElementById("doc-title").value, "content": document.getElementById("document-content").value}'
               hx-swap="none">
        <textarea id="document-content"
                  hx-put="/api/documents/{{ doc.id }}"
                  hx-ext="json-enc"
                  hx-trigger="editor-changed delay:1s"
                  hx-vals='js:{"content": document.getElementById("document-content").value, "title": document.getElementById("doc-title").value}'
                  hx-swap="none"
                  style="display:none">{{ doc.content | e }}</textarea>

        <div class="editor-toolbar">
            <button id="undo-btn" class="toolbar-btn" disabled title="Undo" aria-label="Undo">&#8630; Undo</button>
            <button id="redo-btn" class="toolbar-btn" disabled title="Redo" aria-label="Redo">Redo &#8631;</button>
        </div>

        <div id="editor-mount" class="tiptap-editor tiptap-editor--loading"></div>

        <div id="tiptap-bubble-menu" class="bubble-menu" style="display:none">
            <button type="button" id="bubble-comment-btn">Comment</button>
        </div>

        <!-- US3: Inline suggestions overlay -->
        <div id="inline-suggestions"
             hx-get="/api/documents/{{ doc.id }}/suggestions"
             hx-trigger="load"
             hx-swap="innerHTML">
        </div>

        {% else %}
        <form action="/api/documents/form" method="post">
            <div class="form-group">
                <label for="doc-title">Title</label>
                <input type="text" id="doc-title" name="title" placeholder="Document title" required>
            </div>
            <div class="form-group">
                <label for="doc-overview">Overview</label>
                <textarea id="doc-overview" name="overview" rows="4"
                          placeholder="Describe what this document is about — the AI will research and plan it for you…"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top:0.5rem">Create Document</button>
        </form>
        {% endif %}
    </div>

    <!-- Right: Sidebar -->
    {% if doc %}
    <div class="sidebar">
        <!-- Sources section -->
        <div class="sidebar-section">
            <details class="source-list-details">
                <summary class="source-list-summary">Sources</summary>
                <ul id="source-list"
                    hx-get="/api/documents/{{ doc.id }}/sources"
                    hx-trigger="load"
                    hx-swap="innerHTML">
                </ul>
            </details>

            <!-- US4: Collapsed source entry -->
            <details class="source-add-details">
                <summary class="source-add-summary">Add Source</summary>

                <div class="source-tabs">
                    <button class="tab-btn active" onclick="switchTab('note')">Note</button>
                    <button class="tab-btn" onclick="switchTab('url')">URL</button>
                    <button class="tab-btn" onclick="switchTab('pdf')">PDF</button>
                </div>

                <div id="tab-note" class="tab-panel active">
                    <div id="source-error-note" class="source-error-container"></div>
                    <form hx-post="/api/documents/{{ doc.id }}/sources"
                          hx-target="#source-list"
                          hx-swap="beforeend"
                          hx-on::after-request="this.reset()">
                        <input type="hidden" name="source_type" value="note">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" name="title" placeholder="Note title" required>
                        </div>
                        <div class="form-group">
                            <label>Content</label>
                            <textarea name="content" rows="3" placeholder="Type your note…"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">Add Note</button>
                    </form>
                </div>

                <div id="tab-url" class="tab-panel">
                    <div id="source-error-url" class="source-error-container"></div>
                    <form hx-post="/api/documents/{{ doc.id }}/sources"
                          hx-target="#source-list"
                          hx-swap="beforeend"
                          hx-on::after-request="this.reset()">
                        <input type="hidden" name="source_type" value="url">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" name="title" placeholder="Reference title" required>
                        </div>
                        <div class="form-group">
                            <label>URL</label>
                            <input type="url" name="url" placeholder="https://…" required>
                        </div>
                        <div class="form-group">
                            <label>Summary</label>
                            <textarea name="content" rows="2" placeholder="Optional summary…"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">Add URL</button>
                    </form>
                </div>

                <div id="tab-pdf" class="tab-panel">
                    <div id="source-error-pdf" class="source-error-container"></div>
                    <form hx-post="/api/documents/{{ doc.id }}/sources"
                          hx-target="#source-list"
                          hx-swap="beforeend"
                          hx-encoding="multipart/form-data"
                          hx-on::after-request="this.reset()">
                        <input type="hidden" name="source_type" value="pdf">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" name="title" placeholder="PDF title" required>
                        </div>
                        <div class="form-group">
                            <label>PDF file</label>
                            <input type="file" name="file" accept=".pdf" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">Upload PDF</button>
                    </form>
                </div>
            </details>
        </div>

        <!-- Meta-chat panel -->
        <div class="meta-chat-panel">
            <div class="meta-chat-header">Meta Chat</div>
            <div id="chat-history"
                 hx-get="/api/documents/{{ doc.id }}/chat"
                 hx-trigger="load"
                 hx-swap="innerHTML">
            </div>
            <form class="chat-input-form"
                  hx-post="/api/documents/{{ doc.id }}/chat"
                  hx-target="#chat-history"
                  hx-swap="beforeend"
                  hx-on::before-request="lockEditor(); document.getElementById('chat-send-btn').classList.add('btn--loading')"
                  hx-on::after-request="unlockEditor(); document.getElementById('chat-send-btn').classList.remove('btn--loading'); this.reset()">
                <textarea name="content" class="chat-input-textarea" rows="2" placeholder="Ask the AI anything about your document…" required></textarea>
                <button type="submit" id="chat-send-btn" class="btn btn-primary btn-sm">Send</button>
            </form>
        </div>
    </div>
    {% endif %}
</div>

<!-- AI Instruction modal -->
{% if doc %}
<dialog id="command-modal">
    <form id="modal-comment-form"
          hx-post="/api/documents/{{ doc.id }}/comments"
          hx-target="#inline-suggestions"
          hx-swap="beforeend"
          hx-on::before-request="lockEditor(); document.getElementById('modal-submit-btn').classList.add('modal-submit-btn--loading')"
          hx-on::after-request="unlockEditor(); document.getElementById('modal-submit-btn').classList.remove('modal-submit-btn--loading'); document.getElementById('command-modal').close(); this.reset()">
        <input type="hidden" name="selection_start" id="modal-sel-start" value="0">
        <input type="hidden" name="selection_end" id="modal-sel-end" value="0">
        <input type="hidden" name="selected_text" id="modal-sel-text" value="">
        <div class="modal-input-wrap">
            <textarea name="body" class="modal-body-input" placeholder="Instruction to the AI…" required></textarea>
            <button type="submit" id="modal-submit-btn" class="modal-submit-btn" aria-label="Submit">&#9654;</button>
        </div>
    </form>
</dialog>

<script>
/* switchTab must be in non-module scope — called from onclick attributes */
function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
}

function lockEditor()   { window._cmEditable?.reconfigure(false); }
function unlockEditor() { window._cmEditable?.reconfigure(true); }
</script>

<script type="importmap">
{
  "imports": {
    "@codemirror/state":         "https://esm.sh/@codemirror/state@6",
    "@codemirror/view":          "https://esm.sh/@codemirror/view@6",
    "@codemirror/commands":      "https://esm.sh/@codemirror/commands@6",
    "@codemirror/lang-markdown": "https://esm.sh/@codemirror/lang-markdown@6"
  }
}
</script>

<script type="module">
import { EditorState, Compartment, Transaction } from '@codemirror/state';
import { EditorView }                             from '@codemirror/view';
import { history, undo, redo, undoDepth, redoDepth } from '@codemirror/commands';
import { markdown }                               from '@codemirror/lang-markdown';

const mountEl  = document.getElementById('editor-mount');
const bubbleEl = document.getElementById('tiptap-bubble-menu');

let pendingSelection = { start: 0, end: 0, text: '' };
let pendingClickPos  = { x: 0, y: 0 };
let lastChangeType   = null;

// ── Compartment for toggling editability ──────────────────────────────────
const editableComp = new Compartment();

// Expose reconfigure helper for lockEditor/unlockEditor in non-module scope
window._cmEditable = {
    reconfigure: (on) =>
        view.dispatch({ effects: editableComp.reconfigure(EditorView.editable.of(on)) }),
};

// ── Initial content (plain markdown) ─────────────────────────────────────
const initialContent = document.getElementById('document-content').value || '';

// ── Undo/redo toolbar ─────────────────────────────────────────────────────
const undoBtn = document.getElementById('undo-btn');
const redoBtn = document.getElementById('redo-btn');

function updateToolbar(state) {
    const canUndo = undoDepth(state) > 0;
    const canRedo = redoDepth(state) > 0;
    undoBtn.disabled = !canUndo;
    redoBtn.disabled = !canRedo;
    undoBtn.title = canUndo
        ? (lastChangeType === 'ai-change' ? 'Undo AI change' : 'Undo')
        : 'Nothing to undo';
    redoBtn.title = canRedo ? 'Redo' : 'Nothing to redo';
}

// ── Editor ────────────────────────────────────────────────────────────────
const view = new EditorView({
    state: EditorState.create({
        doc: initialContent,
        extensions: [
            history({ newGroupDelay: 0 }),
            markdown(),
            editableComp.of(EditorView.editable.of(true)),
            EditorView.updateListener.of((update) => {
                if (update.docChanged) {
                    const isAi = update.transactions.some(
                        tr => tr.annotation(Transaction.userEvent) === 'ai-change'
                    );
                    lastChangeType = isAi ? 'ai-change' : 'keystroke';

                    const ta = document.getElementById('document-content');
                    if (ta) {
                        ta.value = update.state.doc.toString();
                        ta.dispatchEvent(new Event('editor-changed'));
                    }
                }
                updateToolbar(update.state);
            }),
        ],
    }),
    parent: mountEl,
});

mountEl.classList.remove('tiptap-editor--loading');
window.cmView = view;

// ── Undo/redo buttons ─────────────────────────────────────────────────────
undoBtn.addEventListener('click', () => undo(view));
redoBtn.addEventListener('click', () => redo(view));

// ── Context menu → bubble menu ────────────────────────────────────────────
mountEl.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const { from, to } = view.state.selection.main;
    pendingSelection = {
        start: from,
        end:   to,
        text:  from !== to ? view.state.sliceDoc(from, to) : '',
    };
    pendingClickPos = { x: e.clientX, y: e.clientY };
    bubbleEl.style.cssText =
        `position:fixed; top:${e.clientY - 44}px; left:${e.clientX}px;` +
        `transform:translateX(-50%); z-index:200; display:flex;`;
});

document.addEventListener('mousedown', (e) => {
    if (!bubbleEl.contains(e.target)) bubbleEl.style.display = 'none';
});

document.getElementById('bubble-comment-btn').addEventListener('click', () => {
    document.getElementById('modal-sel-start').value = pendingSelection.start;
    document.getElementById('modal-sel-end').value   = pendingSelection.end;
    document.getElementById('modal-sel-text').value  = pendingSelection.text;
    const modal = document.getElementById('command-modal');
    modal.style.cssText =
        `margin:0; position:fixed;` +
        `left:${Math.min(pendingClickPos.x, window.innerWidth - 520)}px;` +
        `top:${Math.min(pendingClickPos.y, window.innerHeight - 300)}px;`;
    modal.showModal();
    bubbleEl.style.display = 'none';
});

// ── OOB swap: chat agent replaces #document-content textarea ──────────────
const editorPane = mountEl.closest('.editor-pane');
new MutationObserver((mutations) => {
    for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
            if (node.id === 'document-content') {
                htmx.process(node);
                const md = node.value || '';
                view.dispatch({
                    changes: { from: 0, to: view.state.doc.length, insert: md },
                    annotations: Transaction.userEvent.of('ai-change'),
                });
            }
        }
    }
}).observe(editorPane, { childList: true, subtree: true });
</script>
{% endif %}
{% endblock %}
