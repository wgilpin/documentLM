<div class="suggestion-card suggestion-card--inline" id="suggestion-{{ s.id }}">
    <div class="original">{{ s.original_text }}</div>
    <div class="suggested">{{ s.suggested_text }}</div>
    <div class="suggestion-actions">
        <button class="btn btn-primary"
                style="padding:0.2rem 0.6rem;font-size:0.8rem"
                hx-post="/api/suggestions/{{ s.id }}/accept"
                hx-target="#document-content"
                hx-swap="innerHTML">Accept</button>
        <button class="btn btn-secondary"
                style="padding:0.2rem 0.6rem;font-size:0.8rem"
                hx-post="/api/suggestions/{{ s.id }}/reject"
                hx-target="#suggestion-{{ s.id }}"
                hx-swap="outerHTML">Reject</button>
    </div>
</div>
