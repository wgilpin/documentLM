{% extends "base.html" %}

{% block title %}Sign In — AI Document Workbench{% endblock %}

{% block content %}
<div class="auth-page">
    <h1>Sign In</h1>
    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/auth/login" class="auth-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus value="{{ email or '' }}">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="/auth/register">Register with invite code</a></p>
</div>
{% endblock %}
