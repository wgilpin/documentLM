services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: writer
      POSTGRES_USER: writer
      POSTGRES_PASSWORD: writer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    env_file: .env
    ports:
      - "8000:8000"

volumes:
  postgres_data:
