<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>AetherWrite - Initialize Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#bdc2ff",
              "on-primary": "#ffffff",
              "on-secondary-fixed": "#00201c",
              "error": "#ba1a1a",
              "on-secondary-fixed-variant": "#005048",
              "primary": "#434ca5",
              "surface": "#f8f9fa",
              "surface-variant": "#e1e3e4",
              "on-surface": "#191c1d",
              "secondary": "#006a60",
              "tertiary-fixed": "#ffdbcf",
              "background": "#f8f9fa",
              "on-tertiary-fixed": "#380d00",
              "on-primary-fixed": "#000767",
              "surface-dim": "#d9dadb",
              "on-primary-container": "#f0eeff",
              "tertiary-fixed-dim": "#ffb59b",
              "surface-tint": "#4c56af",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "surface-container-highest": "#e1e3e4",
              "secondary-fixed": "#85f6e5",
              "outline": "#747688",
              "secondary-fixed-dim": "#67d9c9",
              "surface-bright": "#f8f9fa",
              "tertiary": "#993100",
              "on-error-container": "#93000a",
              "on-error": "#ffffff",
              "surface-container-high": "#e7e8e9",
              "surface-container": "#edeeef",
              "primary-container": "#5c65bf",
              "on-primary-fixed-variant": "#343d96",
              "inverse-on-surface": "#f0f1f2",
              "primary-fixed": "#e0e0ff",
              "on-background": "#191c1d",
              "on-tertiary-container": "#ffece6",
              "inverse-surface": "#2e3132",
              "on-secondary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#f3f4f5",
              "on-tertiary-fixed-variant": "#812800",
              "on-secondary-container": "#007166",
              "inverse-primary": "#bdc2ff",
              "tertiary-container": "#c24100",
              "on-surface-variant": "#434656",
              "secondary-container": "#85f6e5",
              "outline-variant": "#c4c5d9"
            },
            fontFamily: {
              "headline": ["Newsreader", "serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-editorial-gradient {
            background: linear-gradient(135deg, #434ca5 0%, #5c65bf 100%);
        }
        .ghost-border {
            outline: 1px solid rgba(196, 197, 217, 0.15);
        }
    </style>
</head>
<body class="text-on-surface selection:bg-secondary-fixed">
<!-- TopAppBar -->
<main class="relative min-h-screen flex items-center justify-center pt-20 pb-12 px-4">
<!-- Login Canvas -->
<div class="relative z-10 w-full max-w-[480px]">
<!-- Editorial Card -->
<div class="bg-surface-container-lowest p-12 ghost-border rounded-lg shadow-[0_12px_40px_rgba(25,28,29,0.06)] relative overflow-hidden">
<header class="mb-12 text-center">
<h1 class="font-headline text-4xl tracking-tight text-on-surface mb-3" style="">Log in</h1>
<p class="font-body text-sm text-outline tracking-tight" style="">Your creation awaits.</p>
</header>
<form class="space-y-8">
<!-- Input Field: Email -->
<div class="relative">
<label class="block font-label uppercase tracking-widest text-[10px] text-outline mb-2" style="">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 focus:ring-0 focus:border-primary transition-all font-body text-on-surface placeholder:text-outline-variant" placeholder="commander@aether.space" type="email">
</div>
<!-- Input Field: Password -->
<div class="relative">
<div class="flex justify-between items-end mb-2">
<label class="block font-label uppercase tracking-widest text-[10px] text-outline" style="">Password</label>
<a class="font-label uppercase tracking-widest text-[10px] text-primary hover:text-primary-container transition-colors" href="#" style="">Forgot?</a>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 focus:ring-0 focus:border-primary transition-all font-body text-on-surface placeholder:text-outline-variant" placeholder="••••••••••••" type="password">
</div>
<!-- Primary Action -->
<div class="pt-4 space-y-6">
<button class="w-full bg-editorial-gradient text-on-primary py-4 px-6 rounded-lg font-label uppercase tracking-widest text-xs font-semibold shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit" style="">
                        Sign In
                        <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform" style="">arrow_forward</span>
</button>
<!-- Divider -->
<!-- Secondary Actions -->
</div>
</form>
<div class="mt-12 text-center">
<p class="font-body text-sm text-outline" style="">
                    New to the teleosis writer? 
                    <a class="text-primary font-medium hover:underline underline-offset-4 ml-1 transition-all" href="#" style="">Request Access</a>
</p>
</div>
</div>

</body></html>
